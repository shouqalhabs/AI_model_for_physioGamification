<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gamer Login</title>
<style>
:root {
    --header-height: 52px;
}

html, body {
    min-height: 100%;
}

body {
    margin: 0;
    background: #ffffff;
    color: #111827;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    min-height: var(--header-height);
    padding: 6px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(17, 24, 39, 0.08);
}

.brand {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-transform: lowercase;
    color: inherit;
    text-decoration: none;
}

.back-link {
    color: inherit;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid rgba(17, 24, 39, 0.16);
    border-radius: 999px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.65);
}

.back-link:hover {
    border-color: rgba(17, 24, 39, 0.35);
}

.bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
}

.shape {
    position: absolute;
    box-shadow: 0 18px 45px rgba(17, 24, 39, 0.06);
    opacity: 0.85;
}

.s1 { width: 240px; height: 170px; left: 3%; top: 88px; background: linear-gradient(135deg, rgba(236, 164, 190, 0.82), rgba(236, 164, 190, 0.50)); border-radius: 48% 52% 44% 56% / 56% 44% 56% 44%; }
.s2 { width: 170px; height: 210px; right: -35px; top: 96px; background: linear-gradient(135deg, rgba(122, 216, 214, 0.82), rgba(122, 216, 214, 0.50)); border-radius: 55px; }
.s3 { width: 200px; height: 175px; left: -30px; bottom: 12%; background: linear-gradient(135deg, rgba(188, 132, 206, 0.85), rgba(188, 132, 206, 0.55)); border-radius: 45px; }
.s4 { width: 220px; height: 180px; right: 5%; bottom: 14%; background: linear-gradient(135deg, rgba(255, 204, 0, 0.92), rgba(255, 204, 0, 0.62)); border-radius: 70px; }

.content {
    min-height: 100vh;
    padding: calc(var(--header-height) + 40px) 18px 40px;
    display: grid;
    place-items: center;
}

.card {
    width: min(520px, 92vw);
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(17, 24, 39, 0.08);
    border-radius: 24px;
    box-shadow: 0 24px 60px rgba(17, 24, 39, 0.10);
    padding: 28px 24px;
}

h1 {
    margin: 0 0 6px;
    font-size: clamp(30px, 4vw, 40px);
    letter-spacing: -0.02em;
}

p {
    margin: 0 0 20px;
    color: rgba(17, 24, 39, 0.72);
}

.field {
    display: grid;
    gap: 8px;
    margin-bottom: 14px;
}

label {
    font-size: 14px;
    font-weight: 600;
}

input {
    height: 44px;
    border-radius: 12px;
    border: 1px solid rgba(17, 24, 39, 0.18);
    padding: 0 12px;
    font: inherit;
}

input:focus {
    outline: 2px solid rgba(236, 164, 190, 0.48);
    border-color: rgba(17, 24, 39, 0.28);
}

button {
    margin-top: 8px;
    width: 100%;
    height: 46px;
    border: 0;
    border-radius: 12px;
    font: inherit;
    font-weight: 650;
    color: #111827;
    background: linear-gradient(135deg, rgba(236, 164, 190, 0.78), rgba(122, 216, 214, 0.70));
    cursor: pointer;
}
</style>
</head>
<body>
<header class="header">
    <a class="brand" href="{% url 'main_login' %}">rehabbo</a>
    <a class="back-link" href="{% url 'main_login' %}">Back Home</a>
</header>

<div class="bg" aria-hidden="true">
    <div class="shape s1"></div>
    <div class="shape s2"></div>
    <div class="shape s3"></div>
    <div class="shape s4"></div>
</div>

<main class="content">
    <section class="card" aria-label="Gamer login form">
        <h1>Gamer Login</h1>
        <p>Sign in to continue your rehab games and progress.</p>
        <form method="post" action="#">
            <div class="field">
                <label for="gamer_email">Email</label>
                <input id="gamer_email" name="gamer_email" type="email" placeholder="player@rehabbo.com" />
            </div>
            <div class="field">
                <label for="gamer_password">Password</label>
                <input id="gamer_password" name="gamer_password" type="password" placeholder="Enter your password" />
            </div>
            <button type="submit">Login as Gamer</button>
        </form>
    </section>
</main>
</body>
</html>
